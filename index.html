<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard TI</title>
  <link rel="stylesheet" href="css/style.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>💻 TI Panel</h2>
    <button onclick="toggleTheme()">🌙 Tema</button>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <h1>Monitoramento</h1>

    <!-- CARDS -->
    <div class="cards">
      <div class="card online">
        <h3>Online</h3>
        <p id="onlineCount">0</p>
      </div>

      <div class="card offline">
        <h3>Offline</h3>
        <p id="offlineCount">0</p>
      </div>
    </div>

    <!-- GRÁFICO -->
    <canvas id="chart"></canvas>

    <!-- BUSCA -->
    <input type="text" id="search" placeholder="Buscar máquina...">

    <!-- TABELA -->
    <table>
      <thead>
        <tr>
          <th>Hostname</th>
          <th>IP</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

  </main>

</div>

<script src="js/script.js"></script>
</body>
</html>
